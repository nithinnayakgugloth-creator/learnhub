{% extends "base.html" %}
{% block title %}Login — LearnHub{% endblock %}
{% block content %}
<div class="container" style="display:flex;align-items:center;justify-content:center;min-height:80vh;">
    <div class="form-card reveal">
        <div style="font-size:2.5rem;text-align:center;margin-bottom:1.5rem;">🔐</div>
        <h2>Welcome Back</h2>
        <p class="sub">Sign in to continue your learning journey.</p>
        {% if error %}<div class="error-msg">{{ error }}</div>{% endif %}
        <form method="post" action="/login">
            <div class="form-group"><label>Email Address</label><input type="email" name="email" placeholder="you@example.com" required></div>
            <div class="form-group"><label>Password</label><input type="password" name="password" placeholder="••••••••" required></div>
            <button type="submit" class="btn btn-primary" style="width:100%;padding:0.85rem;font-size:1rem;">Sign In →</button>
        </form>
        <div class="form-footer">Don't have an account? <a href="/signup">Sign up free</a></div>
    </div>
</div>
{% endblock %}
